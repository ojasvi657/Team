<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Profile Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --primary:#1f3a5f;
      --accent:#3b82f6;
      --bg:#f4f6f9;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
    }

    *{box-sizing:border-box}

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--primary);
      color: white;
      padding: 18px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h2{margin:0}

    .container {
      display: flex;
      height: calc(100vh - 70px);
    }

    .sidebar {
      width: 28%;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 15px;
      overflow-y: auto;
    }

    .search-box input{
      width:100%;
      padding:10px;
      border:1px solid var(--border);
      border-radius:8px;
      margin-bottom:10px;
    }

    .profile-card {
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition:0.2s;
      background:white;
    }

    .profile-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .content {
      width: 72%;
      padding: 25px;
      overflow-y:auto;
    }

    .card{
      background:white;
      border:1px solid var(--border);
      border-radius:14px;
      padding:20px;
      margin-bottom:20px;
    }

    .stats{
      display:flex;
      gap:15px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .stat-box{
      flex:1;
      min-width:150px;
      background:white;
      border:1px solid var(--border);
      border-radius:12px;
      padding:15px;
      text-align:center;
    }

    .tag {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 5px 10px;
      margin: 4px;
      border-radius: 20px;
      font-size: 12px;
    }

    .status { padding:6px 12px; border-radius:20px; font-size:12px; }
    .available { background: #16a34a; color:white }
    .busy { background: #dc2626; color:white }
    .rolling { background: #f59e0b; color:white }

    .timeline{ border-left:3px solid var(--accent); padding-left:15px; margin-top:10px }

    .timeline-item{ margin-bottom:12px }

    .profile-header{
      display:flex;
      align-items:center;
      gap:15px;
      margin-bottom:15px;
    }

    .muted{color:var(--muted)}

  </style>
</head>
<body>

<header>
  <h2>Team Profile Portal</h2>
  <span>Manager Dashboard</span>
</header>

<div class="container">

  <div class="sidebar">
    <div class="search-box">
      <input type="text" placeholder="Search by name or skill..." onkeyup="filterProfiles(this.value)">
    </div>
    <div id="profileList"></div>
  </div>

  <div class="content" id="profileDetails">

    <div class="card" style="text-align:center">
      <h2>Welcome</h2>
      <p class="muted">Select a team member to view profile details, skills, and project timeline.</p>

      <div class="stats" id="stats"></div>
    </div>

  </div>

</div>

<script>
const profiles = [
  { name:"Ankit Sharma", designation:"Data Engineer", photo:"https://randomuser.me/api/portraits/men/32.jpg", skills:["Python","Spark"], experience:[{client:"ABC Corp",duration:"2022-2023"}], status:"busy", visibility:"Team"},
  { name:"Priya Verma", designation:"SAP Consultant", photo:"https://randomuser.me/api/portraits/women/44.jpg", skills:["SAP","ABAP"], experience:[{client:"GlobalTech",duration:"2021-2023"}], status:"available", visibility:"Manager"},
  { name:"Rahul Mehta", designation:"Data Analyst", photo:"https://randomuser.me/api/portraits/men/12.jpg", skills:["SQL","Power BI"], experience:[{client:"InsightCorp",duration:"2022-2024"}], status:"rolling", visibility:"Team"},
  { name:"Sneha Iyer", designation:"ML Engineer", photo:"https://randomuser.me/api/portraits/women/68.jpg", skills:["Python","ML","NLP"], experience:[{client:"AILabs",duration:"2021-2023"}], status:"busy", visibility:"Team"},
  { name:"Arjun Patel", designation:"Backend Developer", photo:"https://randomuser.me/api/portraits/men/55.jpg", skills:["Java","Spring Boot"], experience:[{client:"FinServe",duration:"2020-2022"}], status:"available", visibility:"Team"},
  { name:"Neha Kapoor", designation:"UI/UX Designer", photo:"https://randomuser.me/api/portraits/women/25.jpg", skills:["Figma","UX"], experience:[{client:"DesignPro",duration:"2021-2024"}], status:"rolling", visibility:"Manager"},
  { name:"Karan Singh", designation:"DevOps Engineer", photo:"https://randomuser.me/api/portraits/men/77.jpg", skills:["AWS","Docker"], experience:[{client:"CloudOps",duration:"2022-Present"}], status:"busy", visibility:"Team"}
];

const profileList = document.getElementById("profileList");
const profileDetails = document.getElementById("profileDetails");

function renderProfiles(list){
  profileList.innerHTML="";
  list.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="profile-card";
    div.innerHTML=`
      <img src="${p.photo}" width="40" height="40" style="border-radius:50%">
      <div>
        <div><b>${p.name}</b></div>
        <div class="muted" style="font-size:12px">${p.designation}</div>
      </div>`;
    div.onclick=()=>showProfile(i);
    profileList.appendChild(div);
  })
}

function showProfile(i){
  const p=profiles[i];
  profileDetails.innerHTML=`
    <div class="card">
      <div class="profile-header">
        <img src="${p.photo}" width="70" height="70" style="border-radius:50%">
        <div>
          <h2>${p.name}</h2>
          <div class="muted">${p.designation}</div>
        </div>
        <div style="margin-left:auto">
          <span class="status ${p.status}">${p.status}</span>
        </div>
      </div>

      <div><b>Visibility:</b> ${p.visibility}</div>
    </div>

    <div class="card">
      <h3>Skills</h3>
      ${p.skills.map(s=>`<span class="tag">${s}</span>`).join("")}
    </div>

    <div class="card">
      <h3>Project Timeline</h3>
      <div class="timeline">
        ${p.experience.map(e=>`<div class="timeline-item"><b>${e.client}</b><div class="muted">${e.duration}</div></div>`).join("")}
      </div>
    </div>
  `;
}

function filterProfiles(q){
  q=q.toLowerCase();
  renderProfiles(profiles.filter(p=>p.name.toLowerCase().includes(q)||p.skills.join(" ").toLowerCase().includes(q)))
}

function renderStats(){
  const statsDiv=document.getElementById("stats");
  const available=profiles.filter(p=>p.status==='available').length;
  const busy=profiles.filter(p=>p.status==='busy').length;
  const rolling=profiles.filter(p=>p.status==='rolling').length;

  statsDiv.innerHTML=`
    <div class="stat-box"><h3>${profiles.length}</h3><div class="muted">Total Employees</div></div>
    <div class="stat-box"><h3>${available}</h3><div class="muted">Available</div></div>
    <div class="stat-box"><h3>${busy}</h3><div class="muted">On Project</div></div>
    <div class="stat-box"><h3>${rolling}</h3><div class="muted">Rolling Off</div></div>
  `;
}

renderProfiles(profiles);
renderStats();
</script>

</body>
</html>
