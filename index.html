<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Profile Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root{--primary:#1f3a5f;--accent:#3b82f6;--bg:#f4f6f9;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb}
*{box-sizing:border-box}
body{font-family:Segoe UI,Arial;margin:0;background:var(--bg);color:var(--text)}

header{background:linear-gradient(90deg,#1f3a5f,#2b5c8a);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center}
header h3{margin:0;font-size:20px}
header div{opacity:.9}

.container{display:flex;height:calc(100vh - 64px)}
.sidebar{width:28%;background:#fff;padding:15px;border-right:1px solid var(--border);overflow:auto}
.content{width:72%;padding:20px;overflow:auto}

.search-box input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:12px}

.profile-card{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;align-items:center;transition:.25s}
.profile-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,0.06)}
.profile-card img{border-radius:50%;border:2px solid var(--border)}
.profile-card b{font-size:14px}

.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:15px;box-shadow:0 8px 18px rgba(0,0,0,0.05)}
.card h2{margin-top:0}

.tag{background:var(--accent);color:#fff;padding:6px 10px;border-radius:20px;margin:4px;display:inline-block;font-size:12px}

.status{padding:6px 12px;border-radius:20px;font-size:12px;color:#fff;font-weight:500}
.available{background:#16a34a}
.busy{background:#dc2626}
.rolling{background:#f59e0b}

.actions{display:flex;justify-content:space-between;margin-bottom:15px}
.btn{padding:8px 14px;border:none;background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.btn:hover{opacity:.9}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.stat-box{flex:1;background:#fff;padding:14px;border-radius:14px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:.2s}
.stat-box:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-box b{font-size:18px}

.timeline{border-left:3px solid var(--accent);padding-left:12px;margin-top:10px}
.timeline div{margin-bottom:8px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:14px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.modal-box h3{margin-top:0}
</style>
</head>
<body>

<header>
<h3>Team Profile Portal</h3>
<div>Manager Dashboard</div>
</header>

<div class="container">
<div class="sidebar">
<div class="search-box">
<input type="text" placeholder="Search employees..." onkeyup="filterProfiles(this.value)">
</div>
<div id="profileList"></div>
</div>

<div class="content" id="details"></div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h3>Assign Project</h3>
<input id="emp" disabled style="width:100%;margin-bottom:10px">
<input placeholder="Project Name" style="width:100%;margin-bottom:10px">
<button class="btn" onclick="closeModal()">Assign</button>
</div>
</div>

<script>
var profiles=[
{name:"Ankit Sharma",designation:"Data Engineer",photo:"https://randomuser.me/api/portraits/men/1.jpg",skills:["Python","SQL"],status:"busy",currentProject:"Retail Demand Forecasting",experience:[{client:"Reliance Retail",project:"Sales Forecasting Pipeline",duration:"2023-2024"}]},
{name:"Priya Verma",designation:"SAP Data Consultant",photo:"https://randomuser.me/api/portraits/women/2.jpg",skills:["SAP","ABAP"],status:"available",currentProject:null,experience:[{client:"Infosys",project:"Data Migration",duration:"2022-2023"}]},
{name:"Rahul Mehta",designation:"Data Analyst",photo:"https://randomuser.me/api/portraits/men/3.jpg",skills:["SQL","Power BI"],status:"rolling",currentProject:"Finance KPI Dashboard",endDate:"Jun 2026",experience:[{client:"HDFC Bank",project:"Financial Dashboard",duration:"2023-2024"}]},
{name:"Sneha Iyer",designation:"ML Engineer",photo:"https://randomuser.me/api/portraits/women/4.jpg",skills:["ML","Python"],status:"busy",currentProject:"Customer Churn Model",experience:[{client:"Airtel",project:"Churn Prediction",duration:"2023-2024"}]},
{name:"Arjun Patel",designation:"Data Engineer",photo:"https://randomuser.me/api/portraits/men/5.jpg",skills:["Spark","ETL"],status:"available",currentProject:null,experience:[{client:"Amazon",project:"ETL Pipelines",duration:"2023-2024"}]},
{name:"Neha Kapoor",designation:"BI Developer",photo:"https://randomuser.me/api/portraits/women/6.jpg",skills:["Power BI","SQL"],status:"rolling",currentProject:"Sales Dashboard",endDate:"Aug 2026",experience:[{client:"Wipro",project:"BI Reporting",duration:"2022-2023"}]},
{name:"Karan Singh",designation:"Data Engineer",photo:"https://randomuser.me/api/portraits/men/7.jpg",skills:["AWS","Glue"],status:"busy",currentProject:"Cloud Data Lake",experience:[{client:"TCS",project:"Data Lake Setup",duration:"2023-2024"}]},
{name:"Vikram Rao",designation:"Frontend + Analytics",photo:"https://randomuser.me/api/portraits/men/8.jpg",skills:["React","Charts"],status:"available",currentProject:null,experience:[{client:"Zomato",project:"Analytics UI",duration:"2022-2023"}]},
{name:"Aisha Khan",designation:"QA Analyst",photo:"https://randomuser.me/api/portraits/women/9.jpg",skills:["Testing","Automation"],status:"rolling",currentProject:"Automation Suite",endDate:"Jul 2026",experience:[{client:"Capgemini",project:"QA Automation",duration:"2023-2024"}]},
{name:"Rohit Das",designation:"Data Scientist",photo:"https://randomuser.me/api/portraits/men/10.jpg",skills:["ML","AI"],status:"busy",currentProject:"Prediction Engine",experience:[{client:"Accenture",project:"ML Models",duration:"2023-2024"}]},
{name:"Pooja Nair",designation:"Data Analyst",photo:"https://randomuser.me/api/portraits/women/11.jpg",skills:["Excel","SQL"],status:"available",currentProject:null,experience:[{client:"EY",project:"Business Reports",duration:"2022-2023"}]},
{name:"Manish Gupta",designation:"Big Data Engineer",photo:"https://randomuser.me/api/portraits/men/12.jpg",skills:["Hadoop","Spark"],status:"busy",currentProject:"Log Processing",experience:[{client:"Infosys",project:"Big Data Pipelines",duration:"2023-2024"}]},
{name:"Divya Reddy",designation:"BI Analyst",photo:"https://randomuser.me/api/portraits/women/13.jpg",skills:["Tableau","SQL"],status:"rolling",currentProject:"Marketing Dashboard",endDate:"Sep 2026",experience:[{client:"Deloitte",project:"Marketing Analytics",duration:"2022-2023"}]},
{name:"Siddharth Jain",designation:"Data Engineer",photo:"https://randomuser.me/api/portraits/men/14.jpg",skills:["Kafka","ETL"],status:"available",currentProject:null,experience:[{client:"IBM",project:"Streaming Pipelines",duration:"2023-2024"}]}
];

var list=document.getElementById("profileList");
var details=document.getElementById("details");

function renderProfiles(data){
list.innerHTML="";
for(var i=0;i<data.length;i++){
var p=data[i];
var idx=profiles.findIndex(function(x){return x.name===p.name});
var d=document.createElement("div");
d.className="profile-card";
d.innerHTML="<img src='"+p.photo+"' width='48'><div><b>"+p.name+"</b><div style='color:gray;font-size:12px'>"+p.designation+"</div></div>";
d.onclick=(function(index){return function(){showProfile(index);};})(idx);
list.appendChild(d);
}
}

function showProfile(i){
var p=profiles[i];
var html="";
html+="<div class='actions'>";
html+="<button class='btn' onclick='goHome()'>← Dashboard</button>";
html+="<button class='btn' onclick='openModal("+i+")'>Assign</button>";
html+="</div>";

html+="<div class='card'>";
html+="<h2>"+p.name+"</h2>";
html+="<p style='color:gray'>"+p.designation+"</p>";
html+= p.currentProject ? "<p><b>Current Project:</b> "+p.currentProject+"</p>" : "<p style='color:gray'>No project assigned</p>";
if(p.status==='rolling'){ html+="<p style='color:#f59e0b'><b>Rolling off:</b> "+p.endDate+"</p>"; }
html+="<span class='status "+p.status+"'>"+p.status+"</span>";
html+="</div>";

html+="<div class='card'><h3>Skills</h3>";
for(var j=0;j<p.skills.length;j++){ html+="<span class='tag'>"+p.skills[j]+"</span>"; }
html+="</div>";

html+="<div class='card'><h3>Client Project Experience</h3><div class='timeline'>";

if(p.experience && p.experience.length>0){
  for(var k=0;k<p.experience.length;k++){
    var exp=p.experience[k];
    html+="<div><b>"+exp.client+"</b></div>";
    html+="<div style='color:gray'>"+exp.project+"</div>";
    html+="<div style='font-size:12px;color:#6b7280'>"+exp.duration+"</div>";
  }
}else{
  html+="<div style='color:gray'>No past project data</div>";
}

html+="</div></div>";

details.innerHTML=html;
}

function goHome(){renderStats();renderProfiles(profiles);}

function filterProfiles(q){q=q.toLowerCase();renderProfiles(profiles.filter(function(p){return p.name.toLowerCase().includes(q)}));}

function renderStats(){
var html="";
html+="<div class='card' style='height:100%;display:flex;flex-direction:column;justify-content:center;'>";
html+="<h2 style='margin-bottom:20px'>Dashboard</h2>";
html+="<div class='stats' style='flex:1;align-items:center'>";
html+="<div class='stat-box' style='flex:1;height:120px;display:flex;flex-direction:column;justify-content:center' onclick='filterStatus(\"all\")'><b>"+profiles.length+"</b><br>Total</div>";
html+="<div class='stat-box' style='flex:1;height:120px;display:flex;flex-direction:column;justify-content:center' onclick='filterStatus(\"available\")'><b>"+profiles.filter(function(p){return p.status==='available'}).length+"</b><br>Available</div>";
html+="<div class='stat-box' style='flex:1;height:120px;display:flex;flex-direction:column;justify-content:center' onclick='filterStatus(\"busy\")'><b>"+profiles.filter(function(p){return p.status==='busy'}).length+"</b><br>Busy</div>";
html+="<div class='stat-box' style='flex:1;height:120px;display:flex;flex-direction:column;justify-content:center' onclick='filterStatus(\"rolling\")'><b>"+profiles.filter(function(p){return p.status==='rolling'}).length+"</b><br>Rolling</div>";
html+="</div></div>";

details.innerHTML=html;
}

function filterStatus(s){ if(s==='all') renderProfiles(profiles); else renderProfiles(profiles.filter(function(p){return p.status===s})); }

function openModal(i){document.getElementById("modal").style.display="flex";document.getElementById("emp").value=profiles[i].name;}
function closeModal(){document.getElementById("modal").style.display="none";}

renderProfiles(profiles);
renderStats();
</script>

</body>
</html>
