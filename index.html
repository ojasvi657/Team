<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Profile Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root{--primary:#1f3a5f;--accent:#3b82f6;--bg:#f4f6f9;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb}
*{box-sizing:border-box}
body{font-family:Segoe UI,Arial;margin:0;background:var(--bg);color:var(--text)}
header{background:var(--primary);color:#fff;padding:15px 20px;display:flex;justify-content:space-between}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:28%;background:#fff;padding:15px;border-right:1px solid var(--border);overflow:auto}
.content{width:72%;padding:20px;overflow:auto}
.profile-card{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;align-items:center;transition:.2s}
.profile-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.profile-card img{border-radius:50%}
.tag{background:var(--accent);color:#fff;padding:5px 10px;border-radius:20px;margin:4px;display:inline-block;font-size:12px}
.status{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500}
.available{background:#16a34a;color:#fff}
.busy{background:#dc2626;color:#fff}
.rolling{background:#f59e0b;color:#fff}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:15px}
.timeline{border-left:3px solid var(--accent);padding-left:12px;margin-top:10px}
.timeline div{margin-bottom:8px}
.search-box input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:10px}
.stat-box{cursor:pointer;background:#fff;border:1px solid var(--border);border-radius:12px;padding:15px;margin:6px;text-align:center;flex:1;min-width:120px}
.stats{display:flex;flex-wrap:wrap}
.profile-header{display:flex;align-items:center;gap:15px}
.profile-header img{border-radius:50%}
.muted{color:var(--muted)}
.btn{padding:8px 14px;border:none;background:var(--accent);color:#fff;border-radius:8px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.btn:hover{opacity:.9}
.actions-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.actions-right{display:flex;gap:10px}
.page-title{font-size:18px;font-weight:600}
.btn-secondary{background:#374151}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:14px;padding:18px;width:380px;max-width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.modal h3{margin-top:0}
.modal .row{margin-bottom:10px}
.modal input, .modal select{width:100%;padding:8px;border:1px solid var(--border);border-radius:8px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:#fff;padding:10px 14px;border-radius:8px;display:none;z-index:1100}
</style>
</head>
<body>

<header>
<h3>Team Profile Portal</h3>
<div>Manager Dashboard</div>
</header>

<div class="container">

<div class="sidebar">
  <div class="search-box">
    <input type="text" placeholder="Search by name or skill" onkeyup="filterProfiles(this.value)">
  </div>
  <div id="profileList"></div>
</div>

<div class="content" id="profileDetails"></div>

</div>

<div class="modal-overlay" id="assignModalOverlay">
  <div class="modal">
    <h3>Assign to Project</h3>
    <div class="row">
      <label>Employee</label>
      <input id="assignEmployee" disabled />
    </div>
    <div class="row">
      <label>Project Name</label>
      <input id="projectName" placeholder="Enter project name" />
    </div>
    <div class="row">
      <label>Role</label>
      <select id="projectRole">
        <option>Developer</option>
        <option>Lead</option>
        <option>Consultant</option>
        <option>QA</option>
      </select>
    </div>
    <div class="row">
      <label>Start Date</label>
      <input id="startDate" type="date" />
    </div>
    <div class="actions">
      <button class="btn-secondary btn" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="assignProject()">Assign</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Assigned successfully</div>

<script>
const profiles = [
{name:"Ankit Sharma",designation:"Data Engineer",photo:"https://randomuser.me/api/portraits/men/32.jpg",skills:["Python","Spark","SQL"],experience:[{client:"ABC",duration:"2022-23"}],currentProject:"Retail Analytics Platform",status:"busy"},
{name:"Priya Verma",designation:"SAP Consultant",photo:"https://randomuser.me/api/portraits/women/44.jpg",skills:["SAP","ABAP","Fiori"],experience:[{client:"GlobalTech",duration:"2021-23"}],currentProject:null,status:"available"},
{name:"Rahul Mehta",designation:"Data Analyst",photo:"https://randomuser.me/api/portraits/men/12.jpg",skills:["SQL","Power BI"],experience:[{client:"Insight",duration:"2022-24"}],currentProject:"Finance Dashboard Revamp",status:"rolling",endDate:"Jun 2026"},
{name:"Sneha Iyer",designation:"ML Engineer",photo:"https://randomuser.me/api/portraits/women/68.jpg",skills:["ML","Python","NLP"],experience:[{client:"AI Labs",duration:"2021-23"}],currentProject:"Chatbot AI System",status:"busy"},
{name:"Arjun Patel",designation:"Backend Developer",photo:"https://randomuser.me/api/portraits/men/55.jpg",skills:["Java","Spring"],experience:[{client:"FinServe",duration:"2020-22"}],currentProject:null,status:"available"},
{name:"Neha Kapoor",designation:"UI/UX Designer",photo:"https://randomuser.me/api/portraits/women/25.jpg",skills:["Figma","UX"],experience:[{client:"DesignPro",duration:"2021-24"}],currentProject:"Mobile App Redesign",status:"rolling",endDate:"Aug 2026"},
{name:"Karan Singh",designation:"DevOps Engineer",photo:"https://randomuser.me/api/portraits/men/77.jpg",skills:["AWS","Docker"],experience:[{client:"CloudOps",duration:"2022-Present"}],currentProject:"Cloud Migration",status:"busy"},
{name:"Vikram Rao",designation:"Frontend Developer",photo:"https://randomuser.me/api/portraits/men/41.jpg",skills:["React","JS","CSS"],experience:[{client:"WebCorp",duration:"2021-23"}],currentProject:null,status:"available"},
{name:"Aisha Khan",designation:"QA Engineer",photo:"https://randomuser.me/api/portraits/women/52.jpg",skills:["Testing","Selenium"],experience:[{client:"Testify",duration:"2022-24"}],currentProject:"Automation Suite",status:"rolling",endDate:"Jul 2026"},
{name:"Rohit Das",designation:"Data Scientist",photo:"https://randomuser.me/api/portraits/men/65.jpg",skills:["Python","ML","AI"],experience:[{client:"DataLabs",duration:"2021-Present"}],currentProject:"Prediction Engine",status:"busy"}
];

const list = document.getElementById("profileList");
const details = document.getElementById("profileDetails");

function renderProfiles(data){
  list.innerHTML = "";
  data.forEach((p, i) => {
    const d = document.createElement("div");
    d.className = "profile-card";
    d.innerHTML = `<img src="${p.photo}" width="45"><div><b>${p.name}</b><div class="muted">${p.designation}</div></div>`;
    d.onclick = () => showProfile(i);
    list.appendChild(d);
  });
}

function showProfile(i){
  const p = profiles[i];
  details.innerHTML = `
  <div class="actions-bar">
    <div class="page-title">Profile Details</div>
    <div class="actions-right">
      <button class="btn" onclick="goHome()">← Dashboard</button>
      <button class="btn" onclick="openAssign(${i})">Assign</button>
    </div>
  </div>

  <div class="card">
    <div class="profile-header">
      <img src="${p.photo}" width="70">
      <div>
        <h2>${p.name}</h2>
        <div class="muted">${p.designation}</div>
        ${p.currentProject ? `<div><b>Current Project:</b> ${p.currentProject}</div>` : `<div class="muted">Not assigned to any project</div>`}
        ${p.status === 'rolling' ? `<div class="muted">Rolling off by: <b>${p.endDate}</b></div>` : ''}
      </div>
      <div style="margin-left:auto"><span class="status ${p.status}">${p.status}</span></div>
    </div>
  </div>

  <div class="card">
    <h3>Skills</h3>
    ${p.skills.map(s => `<span class="tag">${s}</span>`).join("")}
  </div>

  <div class="card">
    <h3>Project Timeline</h3>
    <div class="timeline">
      ${p.experience.map(e => `<div><b>${e.client}</b> <span class="muted">(${e.duration})</span></div>`).join("")}
    </div>
  </div>`;
}

function filterProfiles(q){
  q = q.toLowerCase();
  const filtered = profiles.filter(p => p.name.toLowerCase().includes(q) || p.skills.join(" ").toLowerCase().includes(q));
  renderProfiles(filtered);
}

function renderStats(){
  details.innerHTML = `
  <div class="card">
    <h2>Dashboard Overview</h2>
    <p class="muted">Click on stats to filter employees</p>
    <div class="stats">
      <div class="stat-box" onclick="filterByStatus('all')"><b>${profiles.length}</b><br>Total</div>
      <div class="stat-box" onclick="filterByStatus('available')"><b>${profiles.filter(p=>p.status==='available').length}</b><br>Available</div>
      <div class="stat-box" onclick="filterByStatus('busy')"><b>${profiles.filter(p=>p.status==='busy').length}</b><br>Busy</div>
      <div class="stat-box" onclick="filterByStatus('rolling')"><b>${profiles.filter(p=>p.status==='rolling').length}</b><br>Rolling</div>
    </div>
  </div>`;
}

function filterByStatus(s){
  if(s === 'all') renderProfiles(profiles);
  else renderProfiles(profiles.filter(p => p.status === s));
}

function goHome(){
  renderStats();
  renderProfiles(profiles);
}

function openAssign(i){
  const p = profiles[i];
  document.getElementById('assignEmployee').value = p.name;
  document.getElementById('assignModalOverlay').style.display = 'flex';
}

function closeModal(){
  document.getElementById('assignModalOverlay').style.display = 'none';
}

function assignProject(){
  closeModal();
  const t = document.getElementById('toast');
  t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 2000);
}

// initial load
renderProfiles(profiles);
renderStats();
</script>

</body>
</html>
